name: 🐛 Bug Report
description: Report a bug or unexpected behavior in the MCP Server Template
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible to help us reproduce and fix the issue.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checklist
      description: Please confirm you have completed the following before submitting.
      options:
        - label: I have searched existing issues to ensure this is not a duplicate.
          required: true
        - label: I have read the [Contributing Guidelines](../CONTRIBUTING.md).
          required: true
        - label: I am running the latest version of the template.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I do X, Y happens instead of Z..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide detailed steps to reproduce the behavior.
      placeholder: |
        1. Clone the repository
        2. Run `wrangler dev`
        3. Send request to `GET /sse`
        4. Observe error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: "I expected the SSE connection to establish and return..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happens.
      placeholder: "Instead, I see a 500 error with..."
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What operating system are you running?
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Ubuntu / Debian Linux
        - Fedora / RHEL Linux
        - Windows 11
        - Windows 10
        - Other (specify in additional context)
    validations:
      required: true

  - type: dropdown
    id: node_version
    attributes:
      label: Node.js Version
      description: What version of Node.js are you using? (`node --version`)
      options:
        - "22.x"
        - "20.x (LTS)"
        - "18.x (LTS)"
        - "Other (specify in additional context)"
    validations:
      required: true

  - type: input
    id: wrangler_version
    attributes:
      label: Wrangler Version
      description: Output of `wrangler --version`
      placeholder: "e.g. wrangler 3.40.0"
    validations:
      required: true

  - type: dropdown
    id: mcp_client
    attributes:
      label: MCP Client
      description: Which MCP client are you using?
      options:
        - Claude Desktop
        - Cursor
        - Continue.dev
        - Custom / Other (specify below)
        - N/A
    validations:
      required: true

  - type: textarea
    id: error_logs
    attributes:
      label: Error Logs
      description: |
        Paste any relevant error logs here. Run `wrangler dev --log-level debug` for verbose output.
      render: shell
      placeholder: |
        [wrangler] ERROR: ...
        Error: ...
          at ...

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or configuration files that might be relevant.

  - type: checkboxes
    id: pr_willingness
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a pull request to fix this bug.
