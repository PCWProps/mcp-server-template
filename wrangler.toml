name = "mcp-server-template"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Worker limits (adjust as needed for your plan)
# limits = { cpu_ms = 50 }

[vars]
# Base URL for the external API this MCP server wraps.
# Override with: wrangler secret put TARGET_API_BASE_URL
TARGET_API_BASE_URL = "https://api.example.com"

[observability]
enabled = true
head_sampling_rate = 1

# ============================================================
# Staging Environment
# ============================================================
[env.staging]
name = "mcp-server-template-staging"

[env.staging.vars]
TARGET_API_BASE_URL = "https://staging-api.example.com"

# ============================================================
# Production Environment
# ============================================================
[env.production]
name = "mcp-server-template"

[env.production.vars]
TARGET_API_BASE_URL = "https://api.example.com"
