name: 🚀 Feature Request
description: Suggest a new feature or enhancement for the MCP Server Template
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature! Please fill out the form below with as much detail as possible so we can evaluate the request.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I have searched existing issues and discussions to ensure this has not already been requested.
          required: true
        - label: I have read the [Contributing Guidelines](../CONTRIBUTING.md) and [Roadmap](../../README.md#roadmap).
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: |
        Is your feature request related to a problem? Describe the pain point clearly.
        A clear and concise description of what the problem is.
      placeholder: "I'm always frustrated when... / It's currently impossible to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: |
        Describe the solution you'd like to see. Be as specific as possible.
        Include code snippets or API designs if applicable.
      placeholder: |
        I would like to see a new `registerMiddleware()` helper that...

        ```typescript
        // Example API
        server.registerMiddleware({
          name: 'rate-limit',
          handler: async (req, next) => { ... }
        });
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: |
        Describe any alternative solutions or features you've considered.
        Why do you prefer your proposed solution?
      placeholder: "I considered using X, but it doesn't work because..."
    validations:
      required: true

  - type: textarea
    id: use_cases
    attributes:
      label: Use-Case Examples
      description: |
        Provide concrete use-case examples that demonstrate the value of this feature.
        Who benefits and how?
      placeholder: |
        **Use Case 1:** Building a multi-tenant SaaS MCP server where each tenant
        needs isolated tool registrations...

        **Use Case 2:** Teams deploying to multiple Cloudflare environments that
        need environment-specific tool configurations...
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to your workflow?
      options:
        - "Nice to have"
        - "Important — significantly improves my workflow"
        - "Critical — blocks my use of this template"
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any additional context, links to related work, or prior art you'd like to share.

  - type: checkboxes
    id: pr_willingness
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a pull request to implement this feature.
